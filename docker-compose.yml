version: '3.9'

services:

  mysql:
    image: mysql:8.3
    container_name: barber-elite-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: barber_elite
      MYSQL_USER: barber_user
      MYSQL_PASSWORD: barber_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - barber-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "barber_user", "-pbarber_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./barber-elite-backend
      dockerfile: Dockerfile
    container_name: barber-elite-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/barber_elite?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      DB_USERNAME: barber_user
      DB_PASSWORD: barber_pass
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - barber-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/services || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  mysql_data:
    driver: local

networks:
  barber-net:
    name: barber-net        # nome fixo — o frontend vai se anexar a esta rede
    driver: bridge